{{- if .Values.bucketClass.create }}
apiVersion: objectstorage.k8s.io/v1alpha1
kind: BucketClass
metadata:
  name: {{ .Values.bucketClass.name | default (include "versitygw-cosi-driver.fullname" .) }}
  labels:
    {{- include "versitygw-cosi-driver.labels" . | nindent 4 }}
driverName: versitygw.cosi.dev
deletionPolicy: {{ .Values.bucketClass.deletionPolicy }}
{{- with .Values.bucketClass.parameters }}
parameters:
  {{- toYaml . | nindent 2 }}
{{- end }}
{{- end }}
