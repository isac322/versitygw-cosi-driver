name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        run: CGO_ENABLED=0 go build -ldflags="-s -w" -o bin/versitygw-cosi-driver ./cmd/versitygw-cosi-driver

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./internal/...

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7,linux/ppc64le,linux/riscv64,linux/s390x
          push: false

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Lint Helm chart
        run: helm lint deploy/helm/versitygw-cosi-driver --set driver.name=ci-test.cosi.dev

  # The e2e suite is split across two jobs so the fast main tests and the
  # slower (rollout-bound) recovery tests run on independent runners with
  # independent kind clusters. Developers get the main-suite result before
  # the recovery job finishes. Both jobs share the same installer steps;
  # only the final `make` target differs.
  e2e-main:
    runs-on: ubuntu-latest
    # Overall job cap. The actual suite runs under nick-fields/retry with
    # its own per-attempt timeout (10m) and max 2 attempts, so the worst
    # realistic wall-clock is ~21m (two 10m attempts + setup overhead).
    # Warm-cache successful runs finish in ~5-7m.
    timeout-minutes: 22
    permissions:
      contents: read
      packages: read  # pull the prebuilt verifier image from GHCR
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install kind
        uses: helm/kind-action@v1
        with:
          install_only: true

      - name: Install kubectl
        uses: azure/setup-kubectl@v5

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Install Chainsaw
        run: make install-chainsaw

      # COSI v0.2.2 has an optimistic-concurrency race on BucketAccess
      # reconciles (upstream #79/#227) that occasionally pushes a single
      # test past its assert budget on 2 vCPU runners. One retry is enough
      # in practice; a real regression fails both attempts. setup.sh tears
      # down any stale cluster at the top, so the retry starts clean.
      - name: Run E2E main suite
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 10
          max_attempts: 2
          command: |
            export PATH="$HOME/.local/bin:$PATH"
            make test-e2e-main-only

  e2e-recovery:
    runs-on: ubuntu-latest
    # Overall job cap. The actual suite runs under nick-fields/retry with
    # its own per-attempt timeout (12m, covering cold-cache + recovery's
    # inherent ~200s reconcile path) and max 2 attempts. Warm-cache
    # successful runs finish in ~7m.
    timeout-minutes: 26
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install kind
        uses: helm/kind-action@v1
        with:
          install_only: true

      - name: Install kubectl
        uses: azure/setup-kubectl@v5

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Install Chainsaw
        run: make install-chainsaw

      # Same upstream COSI race can nudge the recovery suite's
      # new-provisioning-works-after-restart assert past its budget on
      # 2 vCPU runners. One retry absorbs the flake without hiding a real
      # regression (which fails both attempts).
      - name: Run E2E recovery suite
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 12
          max_attempts: 2
          command: |
            export PATH="$HOME/.local/bin:$PATH"
            make test-e2e-recovery-only
