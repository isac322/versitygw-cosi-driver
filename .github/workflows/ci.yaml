name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        run: CGO_ENABLED=0 go build -ldflags="-s -w" -o bin/versitygw-cosi-driver ./cmd/versitygw-cosi-driver

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./internal/...

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7,linux/ppc64le,linux/riscv64,linux/s390x
          push: false

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Lint Helm chart
        run: helm lint deploy/helm/versitygw-cosi-driver --set driver.name=ci-test.cosi.dev

  # The e2e suite is split across two jobs so the fast main tests and the
  # slower (rollout-bound) recovery tests run on independent runners with
  # independent kind clusters. Developers get the main-suite result before
  # the recovery job finishes. Both jobs share the same installer steps;
  # only the final `make` target differs.
  e2e-main:
    runs-on: ubuntu-latest
    # CI 2 vCPU runners run each stage ~2x slower than a 24-core workstation,
    # and a first-time PR pays full cold-cache penalties (Docker layer cache
    # miss, GHCR verifier image not yet published). 12m covers the cold
    # path and still fails much faster than the previous 30m ceiling;
    # warm-cache runs land well under it.
    timeout-minutes: 12
    permissions:
      contents: read
      packages: read  # pull the prebuilt verifier image from GHCR
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install kind
        uses: helm/kind-action@v1
        with:
          install_only: true

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Install Chainsaw
        run: make install-chainsaw

      - name: Run E2E main suite
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          make test-e2e-main-only

  e2e-recovery:
    runs-on: ubuntu-latest
    # Recovery's post-restart reconcile path is inherently slow on 2 vCPU
    # runners (~130s + ~80s for tc-e-050 / tc-e-051 on a workstation,
    # ~2x on CI), plus the same cold-cache setup as e2e-main. 15m gives
    # enough headroom for both and for an outlier cold-reconcile while
    # still bounding a runaway job well under the previous 30m.
    timeout-minutes: 15
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install kind
        uses: helm/kind-action@v1
        with:
          install_only: true

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Install Chainsaw
        run: make install-chainsaw

      - name: Run E2E recovery suite
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          make test-e2e-recovery-only
