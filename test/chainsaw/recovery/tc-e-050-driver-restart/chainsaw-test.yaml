apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: tc-e-050-driver-restart
spec:
  bindings:
    - name: bucketClassDefault
      value: ($values.bucketClassDefault)
    - name: bucketAccessClassDefault
      value: ($values.bucketAccessClassDefault)
    - name: verifierImage
      value: ($values.verifierImage)
    - name: driverNamespace
      value: ($values.driverNamespace)
    - name: driverDeployment
      value: ($values.driverDeployment)
  # A single long-running verifier Pod handles every PutObject/GetObject check
  # via `kubectl exec`, instead of spawning a fresh Job per verification. Each
  # Job/Pod cycle on kind costs ~8-15s, so the exec pattern saves ~40s across
  # this test's three verification points.
  steps:
    - name: create-stack
      cleanup:
        - script:
            content: ../../cleanup.sh recovery $NAMESPACE $DRIVER_NS $DRIVER_DEPLOY
            env:
              - name: NAMESPACE
                value: ($namespace)
              - name: DRIVER_NS
                value: ($driverNamespace)
              - name: DRIVER_DEPLOY
                value: ($driverDeployment)
      try:
        - apply:
            resource:
              apiVersion: objectstorage.k8s.io/v1alpha1
              kind: BucketClaim
              metadata:
                name: claim
              spec:
                bucketClassName: ($bucketClassDefault)
                protocols: [s3]
        - assert:
            resource:
              apiVersion: objectstorage.k8s.io/v1alpha1
              kind: BucketClaim
              metadata:
                name: claim
              status:
                bucketReady: true
                (bucketName != ''): true
        - apply:
            resource:
              apiVersion: objectstorage.k8s.io/v1alpha1
              kind: BucketAccess
              metadata:
                name: access
              spec:
                bucketClaimName: claim
                bucketAccessClassName: ($bucketAccessClassDefault)
                credentialsSecretName: creds
        - assert:
            resource:
              apiVersion: objectstorage.k8s.io/v1alpha1
              kind: BucketAccess
              metadata:
                name: access
              status:
                accessGranted: true
        - apply:
            resource:
              apiVersion: v1
              kind: Pod
              metadata:
                name: verifier
              spec:
                restartPolicy: Never
                containers:
                  - name: verifier
                    image: ($verifierImage)
                    imagePullPolicy: Never
                    # Default entrypoint with no args runs "sleep infinity"
                    # (idle mode), enabling kubectl exec reuse below.
                    volumeMounts: [{ name: creds, mountPath: /conf }]
                volumes:
                  - name: creds
                    secret:
                      secretName: creds
                      items: [{ key: BucketInfo, path: BucketInfo }]
        - script:
            content: kubectl wait --for=condition=ready pod/verifier -n $NAMESPACE --timeout=30s
            env:
              - name: NAMESPACE
                value: ($namespace)
        - script:
            content: kubectl exec -n $NAMESPACE verifier -- /usr/local/bin/entrypoint.sh put-object pre-restart pre-data
            env:
              - name: NAMESPACE
                value: ($namespace)

    - name: restart-driver
      try:
        - script:
            content: |
              set -eu
              kubectl rollout restart deployment/$DEPLOY -n $DRIVER_NS
              kubectl rollout status deployment/$DEPLOY -n $DRIVER_NS --timeout=60s
            env:
              - name: DEPLOY
                value: ($driverDeployment)
              - name: DRIVER_NS
                value: ($driverNamespace)

    - name: existing-resources-still-ready
      try:
        - assert:
            resource:
              apiVersion: objectstorage.k8s.io/v1alpha1
              kind: BucketClaim
              metadata:
                name: claim
              status:
                bucketReady: true
        - assert:
            resource:
              apiVersion: objectstorage.k8s.io/v1alpha1
              kind: BucketAccess
              metadata:
                name: access
              status:
                accessGranted: true

    - name: existing-credentials-still-work-after-restart
      try:
        - script:
            content: kubectl exec -n $NAMESPACE verifier -- /usr/local/bin/entrypoint.sh put-object post-restart post-data
            env:
              - name: NAMESPACE
                value: ($namespace)
        - script:
            content: kubectl exec -n $NAMESPACE verifier -- /usr/local/bin/entrypoint.sh get-object pre-restart pre-data
            env:
              - name: NAMESPACE
                value: ($namespace)

    - name: new-provisioning-works-after-restart
      try:
        - apply:
            resource:
              apiVersion: objectstorage.k8s.io/v1alpha1
              kind: BucketClaim
              metadata:
                name: claim-new
              spec:
                bucketClassName: ($bucketClassDefault)
                protocols: [s3]
        - assert:
            resource:
              apiVersion: objectstorage.k8s.io/v1alpha1
              kind: BucketClaim
              metadata:
                name: claim-new
              status:
                bucketReady: true
                (bucketName != ''): true
        - apply:
            resource:
              apiVersion: objectstorage.k8s.io/v1alpha1
              kind: BucketAccess
              metadata:
                name: access-new
              spec:
                bucketClaimName: claim-new
                bucketAccessClassName: ($bucketAccessClassDefault)
                credentialsSecretName: creds-new
        - assert:
            resource:
              apiVersion: objectstorage.k8s.io/v1alpha1
              kind: BucketAccess
              metadata:
                name: access-new
              status:
                accessGranted: true
