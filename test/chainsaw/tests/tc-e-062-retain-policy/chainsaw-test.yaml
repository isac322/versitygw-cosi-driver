apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: tc-e-062-bucketclass-retain-policy
spec:
  bindings:
    - name: bucketClassRetain
      value: ($values.bucketClassRetain)
    - name: verifierImage
      value: ($values.verifierImage)
    - name: rootAccessKey
      value: ($values.rootAccessKey)
    - name: rootSecretKey
      value: ($values.rootSecretKey)
  steps:
    - name: create-claim-with-retain-policy
      try:
        - apply:
            resource:
              apiVersion: objectstorage.k8s.io/v1alpha1
              kind: BucketClaim
              metadata:
                name: claim
              spec:
                bucketClassName: ($bucketClassRetain)
                protocols: [s3]
        - assert:
            resource:
              apiVersion: objectstorage.k8s.io/v1alpha1
              kind: BucketClaim
              metadata:
                name: claim
              status:
                bucketReady: true
                (bucketName != ''): true

      cleanup:
        - script:
            content: ../../cleanup.sh full $NAMESPACE
            env:
              - name: NAMESPACE
                value: ($namespace)

    - name: capture-bucket-name-then-delete-claim
      try:
        - script:
            content: |
              set -eu
              BUCKET=$(kubectl get bucketclaim claim -n $NAMESPACE -o jsonpath='{.status.bucketName}')
              kubectl create configmap bucket-info -n $NAMESPACE --from-literal=name="$BUCKET"
              # Wait up to 60s for the normal controller-driven deletion
              # (Retain policy means the controller just removes its
              # finalizer, without calling DriverDeleteBucket). If it stalls
              # (upstream #79, #227) strip the finalizer.
              kubectl delete bucketclaim claim -n $NAMESPACE --wait=false
              for i in $(seq 1 30); do
                kubectl get bucketclaim claim -n $NAMESPACE >/dev/null 2>&1 || exit 0
                sleep 2
              done
              # Retry strip: controller may re-add the finalizer under parallel
              # load (upstream #79, #227) before K8s garbage-collects the
              # resource. Loop until truly gone.
              for i in $(seq 1 15); do
                kubectl patch bucketclaim claim -n $NAMESPACE --type=merge \
                  -p '{"metadata":{"finalizers":null}}' 2>/dev/null || true
                sleep 1
                kubectl get bucketclaim claim -n $NAMESPACE >/dev/null 2>&1 || exit 0
              done
              exit 0
            env:
              - name: NAMESPACE
                value: ($namespace)
        - error:
            resource:
              apiVersion: objectstorage.k8s.io/v1alpha1
              kind: BucketClaim
              metadata:
                name: claim

    - name: bucket-still-exists-in-versitygw
      try:
        - create:
            resource:
              apiVersion: batch/v1
              kind: Job
              metadata:
                name: admin-head-exists
              spec:
                ttlSecondsAfterFinished: 60
                backoffLimit: 0
                template:
                  spec:
                    restartPolicy: Never
                    containers:
                      - name: verifier
                        image: ($verifierImage)
                        imagePullPolicy: Never
                        command: [/usr/local/bin/admin.sh]
                        args: [head-bucket-by-name, $(BUCKET_NAME)]
                        env:
                          - name: ROOT_ACCESS_KEY
                            value: ($rootAccessKey)
                          - name: ROOT_SECRET_KEY
                            value: ($rootSecretKey)
                          - name: BUCKET_NAME
                            valueFrom:
                              configMapKeyRef:
                                name: bucket-info
                                key: name
        - assert:
            resource:
              apiVersion: batch/v1
              kind: Job
              metadata:
                name: admin-head-exists
              status:
                succeeded: 1

    - name: cleanup-retained-bucket
      # Retain policy intentionally leaves the bucket behind; clean it up so
      # subsequent runs don't accumulate stale buckets.
      try:
        - create:
            resource:
              apiVersion: batch/v1
              kind: Job
              metadata:
                name: admin-delete-bucket
              spec:
                ttlSecondsAfterFinished: 60
                backoffLimit: 0
                template:
                  spec:
                    restartPolicy: Never
                    containers:
                      - name: verifier
                        image: ($verifierImage)
                        imagePullPolicy: Never
                        command: [/usr/local/bin/admin.sh]
                        args: [delete-bucket-by-name, $(BUCKET_NAME)]
                        env:
                          - name: ROOT_ACCESS_KEY
                            value: ($rootAccessKey)
                          - name: ROOT_SECRET_KEY
                            value: ($rootSecretKey)
                          - name: BUCKET_NAME
                            valueFrom:
                              configMapKeyRef:
                                name: bucket-info
                                key: name
        - assert:
            resource:
              apiVersion: batch/v1
              kind: Job
              metadata:
                name: admin-delete-bucket
              status:
                succeeded: 1
