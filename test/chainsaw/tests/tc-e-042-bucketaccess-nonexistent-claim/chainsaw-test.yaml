apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: tc-e-042-bucketaccess-nonexistent-claim
spec:
  bindings:
    - name: bucketAccessClassDefault
      value: ($values.bucketAccessClassDefault)
  steps:
    - name: create-access-pointing-at-ghost-claim
      try:
        - apply:
            resource:
              apiVersion: objectstorage.k8s.io/v1alpha1
              kind: BucketAccess
              metadata:
                name: access
              spec:
                bucketClaimName: ghost-claim
                bucketAccessClassName: ($bucketAccessClassDefault)
                credentialsSecretName: creds
        - error:
            resource:
              apiVersion: objectstorage.k8s.io/v1alpha1
              kind: BucketAccess
              metadata:
                name: access
              status:
                accessGranted: true

      cleanup:
        - script:
            content: ../../cleanup.sh full $NAMESPACE
            env:
              - name: NAMESPACE
                value: ($namespace)
