apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: tc-e-008-delete-bucketaccess-revokes-access
spec:
  bindings:
    - name: bucketClassDefault
      value: ($values.bucketClassDefault)
    - name: bucketAccessClassDefault
      value: ($values.bucketAccessClassDefault)
    - name: verifierImage
      value: ($values.verifierImage)
  steps:
    - name: create-claim-access-and-put-object-before-revoke
      try:
        - apply:
            resource:
              apiVersion: objectstorage.k8s.io/v1alpha1
              kind: BucketClaim
              metadata:
                name: claim
              spec:
                bucketClassName: ($bucketClassDefault)
                protocols: [s3]
        - assert:
            resource:
              apiVersion: objectstorage.k8s.io/v1alpha1
              kind: BucketClaim
              metadata:
                name: claim
              status:
                bucketReady: true
                (bucketName != ''): true
        - apply:
            resource:
              apiVersion: objectstorage.k8s.io/v1alpha1
              kind: BucketAccess
              metadata:
                name: access
              spec:
                bucketClaimName: claim
                bucketAccessClassName: ($bucketAccessClassDefault)
                credentialsSecretName: creds
        - assert:
            resource:
              apiVersion: objectstorage.k8s.io/v1alpha1
              kind: BucketAccess
              metadata:
                name: access
              status:
                accessGranted: true
        - create:
            resource:
              apiVersion: batch/v1
              kind: Job
              metadata:
                name: put-before-revoke
              spec:
                ttlSecondsAfterFinished: 60
                backoffLimit: 0
                template:
                  spec:
                    restartPolicy: Never
                    containers:
                      - name: verifier
                        image: ($verifierImage)
                        imagePullPolicy: Never
                        args: [put-object, pre-revoke-key, before-data]
                        volumeMounts:
                          - name: creds
                            mountPath: /conf
                    volumes:
                      - name: creds
                        secret:
                          secretName: creds
                          items:
                            - { key: BucketInfo, path: BucketInfo }
        - assert:
            resource:
              apiVersion: batch/v1
              kind: Job
              metadata:
                name: put-before-revoke
              status:
                succeeded: 1

      cleanup:
        - script:
            content: ../../cleanup.sh full $NAMESPACE
            env:
              - name: NAMESPACE
                value: ($namespace)

    - name: snapshot-creds-then-delete-access
      # Persist the Secret data into a dedicated Secret so the post-revoke Job
      # can still mount it after the original is deleted.
      try:
        - script:
            content: |
              set -euo pipefail
              BI=$(kubectl get secret creds -n $NAMESPACE -o jsonpath='{.data.BucketInfo}')
              kubectl create secret generic creds-snapshot -n $NAMESPACE --from-literal=placeholder=x
              kubectl patch secret creds-snapshot -n $NAMESPACE --type=json -p "[{\"op\":\"add\",\"path\":\"/data/BucketInfo\",\"value\":\"$BI\"}]"
              kubectl delete bucketaccess access -n $NAMESPACE --wait=false
              sleep 5
              # Workaround: strip finalizers then explicit-delete Secret
              # (upstream #79, #227). Retry because controller can re-add the
              # finalizer under parallel load before garbage-collection.
              for i in $(seq 1 15); do
                kubectl get secret creds -n $NAMESPACE >/dev/null 2>&1 || break
                kubectl patch bucketaccess access -n $NAMESPACE --type=merge \
                  -p '{"metadata":{"finalizers":null}}' 2>/dev/null || true
                kubectl patch secret creds -n $NAMESPACE --type=merge \
                  -p '{"metadata":{"finalizers":null}}' 2>/dev/null || true
                kubectl delete secret creds -n $NAMESPACE --ignore-not-found 2>/dev/null || true
                sleep 1
              done
            env:
              - name: NAMESPACE
                value: ($namespace)
        - error:
            resource:
              apiVersion: v1
              kind: Secret
              metadata:
                name: creds

    - name: verify-old-credentials-denied
      try:
        - create:
            resource:
              apiVersion: batch/v1
              kind: Job
              metadata:
                name: put-after-revoke
              spec:
                ttlSecondsAfterFinished: 60
                backoffLimit: 0
                template:
                  spec:
                    restartPolicy: Never
                    containers:
                      - name: verifier
                        image: ($verifierImage)
                        imagePullPolicy: Never
                        args: [expect-403, put-object, post-revoke-key, after-data]
                        volumeMounts:
                          - name: creds
                            mountPath: /conf
                    volumes:
                      - name: creds
                        secret:
                          secretName: creds-snapshot
                          items:
                            - { key: BucketInfo, path: BucketInfo }
        - assert:
            resource:
              apiVersion: batch/v1
              kind: Job
              metadata:
                name: put-after-revoke
              status:
                succeeded: 1
