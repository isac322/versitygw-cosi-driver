apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: tc-e-030-pod-putobject
spec:
  bindings:
    - name: bucketClassDefault
      value: ($values.bucketClassDefault)
    - name: bucketAccessClassDefault
      value: ($values.bucketAccessClassDefault)
    - name: verifierImage
      value: ($values.verifierImage)
    - name: rootAccessKey
      value: ($values.rootAccessKey)
    - name: rootSecretKey
      value: ($values.rootSecretKey)
  steps:
    - name: create-stack
      try:
        - apply:
            resource:
              apiVersion: objectstorage.k8s.io/v1alpha1
              kind: BucketClaim
              metadata:
                name: claim
              spec:
                bucketClassName: ($bucketClassDefault)
                protocols: [s3]
        - assert:
            resource:
              apiVersion: objectstorage.k8s.io/v1alpha1
              kind: BucketClaim
              metadata:
                name: claim
              status:
                bucketReady: true
                (bucketName != ''): true
        - apply:
            resource:
              apiVersion: objectstorage.k8s.io/v1alpha1
              kind: BucketAccess
              metadata:
                name: access
              spec:
                bucketClaimName: claim
                bucketAccessClassName: ($bucketAccessClassDefault)
                credentialsSecretName: creds
        - assert:
            resource:
              apiVersion: objectstorage.k8s.io/v1alpha1
              kind: BucketAccess
              metadata:
                name: access
              status:
                accessGranted: true

      cleanup:
        - script:
            content: ../../cleanup.sh full $NAMESPACE
            env:
              - name: NAMESPACE
                value: ($namespace)

    - name: pod-put-object
      try:
        - create:
            resource:
              apiVersion: batch/v1
              kind: Job
              metadata:
                name: user-put
              spec:
                ttlSecondsAfterFinished: 60
                backoffLimit: 0
                template:
                  spec:
                    restartPolicy: Never
                    containers:
                      - name: verifier
                        image: ($verifierImage)
                        imagePullPolicy: Never
                        args: [put-object, test-put-key, test-put-value]
                        volumeMounts:
                          - { name: creds, mountPath: /conf }
                    volumes:
                      - name: creds
                        secret:
                          secretName: creds
                          items:
                            - { key: BucketInfo, path: BucketInfo }
        - assert:
            resource:
              apiVersion: batch/v1
              kind: Job
              metadata:
                name: user-put
              status:
                succeeded: 1

    - name: admin-verifies-object-exists
      try:
        - script:
            content: |
              set -euo pipefail
              BUCKET=$(kubectl get bucketclaim claim -n $NAMESPACE -o jsonpath='{.status.bucketName}')
              kubectl create configmap bucket-info -n $NAMESPACE --from-literal=name="$BUCKET"
            env:
              - name: NAMESPACE
                value: ($namespace)
        - create:
            resource:
              apiVersion: batch/v1
              kind: Job
              metadata:
                name: admin-head-object
              spec:
                ttlSecondsAfterFinished: 60
                backoffLimit: 0
                template:
                  spec:
                    restartPolicy: Never
                    containers:
                      - name: verifier
                        image: ($verifierImage)
                        imagePullPolicy: Never
                        command: [/usr/local/bin/admin.sh]
                        args: [head-object, $(BUCKET_NAME), test-put-key]
                        env:
                          - name: ROOT_ACCESS_KEY
                            value: ($rootAccessKey)
                          - name: ROOT_SECRET_KEY
                            value: ($rootSecretKey)
                          - name: BUCKET_NAME
                            valueFrom:
                              configMapKeyRef:
                                name: bucket-info
                                key: name
        - assert:
            resource:
              apiVersion: batch/v1
              kind: Job
              metadata:
                name: admin-head-object
              status:
                succeeded: 1
