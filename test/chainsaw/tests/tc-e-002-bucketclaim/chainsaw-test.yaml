apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: tc-e-002-bucketclaim-creates-bucket
spec:
  bindings:
    - name: bucketClassDefault
      value: ($values.bucketClassDefault)
  steps:
    - name: create-bucketclaim-and-verify-bucket-crd
      try:
        - apply:
            resource:
              apiVersion: objectstorage.k8s.io/v1alpha1
              kind: BucketClaim
              metadata:
                name: claim
              spec:
                bucketClassName: ($bucketClassDefault)
                protocols: [s3]
        - assert:
            resource:
              apiVersion: objectstorage.k8s.io/v1alpha1
              kind: BucketClaim
              metadata:
                name: claim
              status:
                bucketReady: true
                (bucketName != ''): true
        - script:
            content: |
              set -eu
              # The assert above already gated on (bucketName != ''), so
              # status.bucketName is populated by the time this script runs.
              BUCKET=$(kubectl get bucketclaim claim -n $NAMESPACE -o jsonpath='{.status.bucketName}')
              kubectl get bucket "$BUCKET"
            env:
              - name: NAMESPACE
                value: ($namespace)

      cleanup:
        - script:
            content: ../../cleanup.sh full $NAMESPACE
            env:
              - name: NAMESPACE
                value: ($namespace)
