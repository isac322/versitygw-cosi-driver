apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: tc-e-001-bucketclass-creation
spec:
  bindings:
    - name: bucketClassDefault
      value: ($values.bucketClassDefault)
    - name: driverName
      value: ($values.driverName)
  steps:
    - name: assert-bucketclass-exists
      try:
        - assert:
            resource:
              apiVersion: objectstorage.k8s.io/v1alpha1
              kind: BucketClass
              metadata:
                name: ($bucketClassDefault)
              driverName: ($driverName)
              deletionPolicy: Delete
      cleanup:
        - script:
            content: ../../cleanup.sh simple $NAMESPACE
            env:
              - name: NAMESPACE
                value: ($namespace)
