apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: tc-e-023-credentials-connect
spec:
  bindings:
    - name: bucketClassDefault
      value: ($values.bucketClassDefault)
    - name: bucketAccessClassDefault
      value: ($values.bucketAccessClassDefault)
    - name: verifierImage
      value: ($values.verifierImage)
  steps:
    - name: create-claim-and-access
      try:
        - apply:
            resource:
              apiVersion: objectstorage.k8s.io/v1alpha1
              kind: BucketClaim
              metadata:
                name: claim
              spec:
                bucketClassName: ($bucketClassDefault)
                protocols: [s3]
        - assert:
            resource:
              apiVersion: objectstorage.k8s.io/v1alpha1
              kind: BucketClaim
              metadata:
                name: claim
              status:
                bucketReady: true
                (bucketName != ''): true
        - apply:
            resource:
              apiVersion: objectstorage.k8s.io/v1alpha1
              kind: BucketAccess
              metadata:
                name: access
              spec:
                bucketClaimName: claim
                bucketAccessClassName: ($bucketAccessClassDefault)
                credentialsSecretName: creds
        - assert:
            resource:
              apiVersion: objectstorage.k8s.io/v1alpha1
              kind: BucketAccess
              metadata:
                name: access
              status:
                accessGranted: true
        - assert:
            resource:
              apiVersion: v1
              kind: Secret
              metadata:
                name: creds
              (data.BucketInfo != ''): true

      cleanup:
        - script:
            content: ../../cleanup.sh full $NAMESPACE
            env:
              - name: NAMESPACE
                value: ($namespace)

    - name: verify-head-bucket-via-user-credentials
      try:
        - create:
            resource:
              apiVersion: batch/v1
              kind: Job
              metadata:
                name: verify-head-bucket
              spec:
                ttlSecondsAfterFinished: 60
                backoffLimit: 0
                template:
                  spec:
                    restartPolicy: Never
                    containers:
                      - name: verifier
                        image: ($verifierImage)
                        imagePullPolicy: Never
                        args: [head-bucket]
                        volumeMounts:
                          - name: creds
                            mountPath: /conf
                    volumes:
                      - name: creds
                        secret:
                          secretName: creds
                          items:
                            - key: BucketInfo
                              path: BucketInfo
        - assert:
            resource:
              apiVersion: batch/v1
              kind: Job
              metadata:
                name: verify-head-bucket
              status:
                succeeded: 1
