apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: tc-e-021-secret-bucketinfo-endpoint
spec:
  # Decodes Secret.data.BucketInfo and asserts presence of endpoint + bucketName
  # via a Job running jq. Mirrors the upstream COSI Chainsaw pattern of using
  # a validator container rather than native base64 decoding in assertions.
  bindings:
    - name: bucketClassDefault
      value: ($values.bucketClassDefault)
    - name: bucketAccessClassDefault
      value: ($values.bucketAccessClassDefault)
    - name: verifierImage
      value: ($values.verifierImage)
  steps:
    - name: create-stack
      try:
        - apply:
            resource:
              apiVersion: objectstorage.k8s.io/v1alpha1
              kind: BucketClaim
              metadata:
                name: claim
              spec:
                bucketClassName: ($bucketClassDefault)
                protocols: [s3]
        - assert:
            resource:
              apiVersion: objectstorage.k8s.io/v1alpha1
              kind: BucketClaim
              metadata:
                name: claim
              status:
                bucketReady: true
                (bucketName != ''): true
        - apply:
            resource:
              apiVersion: objectstorage.k8s.io/v1alpha1
              kind: BucketAccess
              metadata:
                name: access
              spec:
                bucketClaimName: claim
                bucketAccessClassName: ($bucketAccessClassDefault)
                credentialsSecretName: creds
        - assert:
            resource:
              apiVersion: objectstorage.k8s.io/v1alpha1
              kind: BucketAccess
              metadata:
                name: access
              status:
                accessGranted: true

      cleanup:
        - script:
            content: ../../cleanup.sh full $NAMESPACE
            env:
              - name: NAMESPACE
                value: ($namespace)

    - name: validate-bucketinfo-fields
      try:
        - create:
            resource:
              apiVersion: batch/v1
              kind: Job
              metadata:
                name: validate-endpoint
              spec:
                ttlSecondsAfterFinished: 60
                backoffLimit: 0
                template:
                  spec:
                    restartPolicy: Never
                    containers:
                      - name: validator
                        image: ($verifierImage)
                        imagePullPolicy: Never
                        command: [/bin/sh, -c]
                        args:
                          - |
                            set -eu
                            BI=/conf/BucketInfo
                            jq -e '.spec.secretS3.endpoint != null and .spec.secretS3.endpoint != ""' "$BI"
                            jq -e '.spec.bucketName != null and .spec.bucketName != ""' "$BI"
                        volumeMounts:
                          - { name: creds, mountPath: /conf }
                    volumes:
                      - name: creds
                        secret:
                          secretName: creds
                          items:
                            - { key: BucketInfo, path: BucketInfo }
        - assert:
            resource:
              apiVersion: batch/v1
              kind: Job
              metadata:
                name: validate-endpoint
              status:
                succeeded: 1
